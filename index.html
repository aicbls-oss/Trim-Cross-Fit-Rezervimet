<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trim CrossFit Reservations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A28;
            --secondary: #2D3142;
            --accent: #FFD23F;
            --bg: #F7F7F2;
            --card: #FFFFFF;
            --text: #2D3142;
            --text-light: #6B6B6B;
            --success: #4ECDC4;
            --danger: #FF6B6B;
            --border: #E0E0E0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(45, 49, 66, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 107, 53, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        /* Header */
        .header {
            background: var(--secondary);
            color: white;
            padding: 30px 0;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: var(--primary);
            opacity: 0.1;
            border-radius: 50%;
        }
        
        .header h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 3.5rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
            position: relative;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            position: relative;
        }
        
        .header-actions {
            position: absolute;
            top: 30px;
            right: 30px;
        }
        
        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        
        .login-card {
            background: var(--card);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            max-width: 450px;
            width: 100%;
        }
        
        .login-card h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .login-card p {
            color: var(--text-light);
            margin-bottom: 30px;
        }
        
        /* Date Selector */
        .date-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .date-btn {
            padding: 15px 25px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            color: var(--text);
        }
        
        .date-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.2);
        }
        
        .date-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .date-btn .day {
            display: block;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .date-btn .date {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        /* Classes Grid */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .class-card {
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .class-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: var(--primary);
        }
        
        .class-time {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .trainer-name {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            color: var(--text-light);
            font-size: 0.95rem;
        }
        
        .trainer-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--secondary);
        }
        
        .class-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .capacity {
            font-size: 0.95rem;
            color: var(--text-light);
        }
        
        .capacity-number {
            font-weight: 700;
            color: var(--text);
            font-size: 1.1rem;
        }
        
        .capacity.full .capacity-number {
            color: var(--danger);
        }
        
        .capacity.almost-full .capacity-number {
            color: var(--accent);
        }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.available {
            background: rgba(78, 205, 196, 0.15);
            color: var(--success);
        }
        
        .status-badge.full {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }
        
        /* Member List */
        .members-list {
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .member-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        
        .member-name {
            flex: 1;
            font-weight: 500;
        }
        
        .waitlist-badge {
            padding: 4px 10px;
            background: var(--accent);
            color: var(--secondary);
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        /* Admin account item */
        .admin-account-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .admin-account-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .admin-account-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .admin-account-details h4 {
            margin: 0;
            color: var(--text);
            font-size: 1rem;
        }
        
        .admin-account-details p {
            margin: 0;
            color: var(--text-light);
            font-size: 0.85rem;
        }
        
        /* Booking Form */
        .booking-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .booking-form input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .booking-form input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        
        .btn-secondary {
            background: var(--secondary);
            color: white;
        }
        
        .btn-secondary:hover {
            background: #1f2230;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        
        .btn-danger:hover {
            background: #ff5252;
        }
        
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        
        .btn-outline:hover {
            background: white;
            color: var(--secondary);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn.loading {
            position: relative;
            color: transparent;
        }
        
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        /* Admin Panel */
        .admin-controls {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .admin-controls h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--primary);
            letter-spacing: 2px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Work Sans', sans-serif;
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 4px solid var(--primary);
        }
        
        .stat-value {
            font-family: 'Bebas Neue', cursive;
            font-size: 3rem;
            color: var(--primary);
            letter-spacing: 2px;
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Messages */
        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideIn 0.4s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .message.success {
            background: rgba(78, 205, 196, 0.15);
            color: var(--success);
            border-left: 4px solid var(--success);
        }
        
        .message.error {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Tab Navigation for Admin */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .admin-tab {
            padding: 12px 24px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
        }
        
        .admin-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .admin-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .header-actions {
                position: static;
                margin-top: 20px;
            }
            
            .classes-grid {
                grid-template-columns: 1fr;
            }
            
            .date-selector {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
            
            .login-card {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Trim CrossFit...</div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen hidden">
        <div class="login-card">
            <h2>ADMIN LOGIN</h2>
            <p>Enter your credentials to access the admin dashboard</p>
            <div id="loginMessage"></div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-bottom: 15px;" onclick="login()">Login</button>
            <button class="btn btn-secondary" style="width: 100%;" onclick="goToMemberView()">Back to Member Booking</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="header">
            <div class="container">
                <div class="header-actions">
                    <button id="adminButton" class="btn btn-outline" onclick="showAdminLogin()">Admin Access</button>
                    <button id="logoutButton" class="btn btn-outline hidden" onclick="logout()">Logout</button>
                </div>
                <h1>TRIM CROSSFIT RESERVATIONS</h1>
                <p>Book your spot. Push your limits.</p>
            </div>
        </div>
        
        <div class="container">
            <!-- Member View -->
            <div id="member-view">
                <h2 style="font-family: 'Bebas Neue', cursive; font-size: 2rem; margin-bottom: 20px; letter-spacing: 2px;">BOOK YOUR CLASS</h2>
                <div class="date-selector" id="dateSelector"></div>
                <div class="classes-grid" id="classesGrid"></div>
            </div>
            
            <!-- Admin View -->
            <div id="admin-view" class="hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
                    <h2 style="font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 2px; margin: 0;">ADMIN DASHBOARD</h2>
                    <button class="btn btn-secondary" onclick="showMemberView()">View Member Booking</button>
                </div>
                
                <div class="admin-tabs">
                    <button class="admin-tab active" onclick="switchAdminTab('overview')">Overview</button>
                    <button class="admin-tab" onclick="switchAdminTab('classes')">Manage Classes</button>
                    <button class="admin-tab" onclick="switchAdminTab('settings')">Settings</button>
                </div>
                
                <!-- Overview Tab -->
                <div id="admin-overview" class="admin-tab-content">
                    <div class="stats-grid" id="statsGrid"></div>
                </div>
                
                <!-- Classes Tab -->
                <div id="admin-classes" class="admin-tab-content hidden">
                    <div class="admin-controls">
                        <h2>Add New Class</h2>
                        <div id="addClassMessage"></div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="newClassDate">
                            </div>
                            <div class="form-group">
                                <label>Time</label>
                                <input type="time" id="newClassTime">
                            </div>
                            <div class="form-group">
                                <label>Trainer Name</label>
                                <input type="text" id="newClassTrainer" placeholder="e.g., Coach Sarah">
                            </div>
                            <div class="form-group">
                                <label>Capacity</label>
                                <input type="number" id="newClassCapacity" value="15" min="1" max="30">
                            </div>
                        </div>
                        <button class="btn btn-primary" id="addClassBtn" onclick="addClass()">Add Class</button>
                    </div>
                    
                    <div class="admin-controls">
                        <h2>All Classes</h2>
                        <div id="adminClassesList"></div>
                    </div>
                </div>
                
                <!-- Settings Tab -->
                <div id="admin-settings" class="admin-tab-content hidden">
                    <div class="admin-controls">
                        <h2>Admin Accounts</h2>
                        <p style="color: var(--text-light); margin-bottom: 20px;">Manage who can access the admin dashboard</p>
                        <div id="adminAccountsList"></div>
                    </div>
                    
                    <div class="admin-controls">
                        <h2>Add New Admin Account</h2>
                        <div id="addAdminMessage"></div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" id="newAdminUsername" placeholder="Enter username">
                            </div>
                            <div class="form-group">
                                <label>Password</label>
                                <input type="password" id="newAdminPassword" placeholder="Enter password">
                            </div>
                            <div class="form-group">
                                <label>Name (optional)</label>
                                <input type="text" id="newAdminName" placeholder="e.g., John Smith">
                            </div>
                        </div>
                        <button class="btn btn-primary" onclick="addAdminAccount()">Add Admin Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Google Apps Script Web App URL - NEW URL!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhMlbbaqWUpQu0KH1Z9XTlEPnY2aIIoUslyi2AHDUG2tLEPV1QVeFrbdZofHYj8VyO/exec';
        
        // Cache
        let classesCache = [];
        let bookingsCache = [];
        let adminsCache = [];
        
        // Admin session
        let isAdminLoggedIn = false;
        let currentAdminTab = 'overview';
        let currentAdminUsername = null;
        let selectedDate = new Date().toISOString().split('T')[0];
        
        // Helper: Format time to HH:MM
        function formatTimeInput(time) {
            const parts = time.split(':');
            const hours = parts[0].padStart(2, '0');
            const minutes = parts[1] ? parts[1].padStart(2, '0') : '00';
            return `${hours}:${minutes}`;
        }
        
        // API Helper Functions
        async function fetchData(action) {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=${action}`);
                const result = await response.json();
                return result.success ? result.data : [];
            } catch (error) {
                console.error(`Error fetching ${action}:`, error);
                return [];
            }
        }
        
        async function postData(action, data) {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=${action}`, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                return result.success;
            } catch (error) {
                console.error(`Error posting ${action}:`, error);
                return false;
            }
        }
        
        // Load all data
        async function loadAllData() {
            try {
                const [classes, bookings, admins] = await Promise.all([
                    fetchData('getClasses'),
                    fetchData('getBookings'),
                    fetchData('getAdmins')
                ]);
                
                classesCache = classes;
                bookingsCache = bookings;
                adminsCache = admins.length > 0 ? admins : [{ username: 'admin', password: 'admin123', name: 'Main Admin' }];
                
                return true;
            } catch (error) {
                console.error('Error loading data:', error);
                return false;
            }
        }
        
        // Get classes
        function getClasses() {
            return classesCache;
        }
        
        // Save class
        async function saveClass(classData) {
            const success = await postData('addClass', classData);
            if (success) await loadAllData();
            return success;
        }
        
        // Delete class
        async function deleteClass(classId) {
            const success = await postData('deleteClass', { classId });
            if (success) await loadAllData();
            return success;
        }
        
        // Get bookings for a class
        function getClassBookings(classId) {
            const classBookings = bookingsCache.filter(b => b.classId === classId);
            return {
                members: classBookings.filter(b => b.isWaitlist !== 'true').map(b => b.memberName),
                waitlist: classBookings.filter(b => b.isWaitlist === 'true').map(b => b.memberName)
            };
        }
        
        // Add booking
        async function addBooking(classId, memberName, isWaitlist) {
            const success = await postData('addBooking', {
                classId,
                memberName,
                isWaitlist: isWaitlist ? 'true' : 'false'
            });
            if (success) await loadAllData();
            return success;
        }
        
        // Remove booking
        async function removeBooking(classId, memberName) {
            const success = await postData('deleteBooking', { classId, memberName });
            if (success) await loadAllData();
            return success;
        }
        
        // Get admin accounts
        function getAdminAccounts() {
            return adminsCache;
        }
        
        // Add admin account
        async function addAdminAccountToSheet(username, password, name) {
            const success = await postData('addAdmin', { username, password, name });
            if (success) await loadAllData();
            return success;
        }
        
        // Delete admin account
        async function deleteAdminAccountFromSheet(username) {
            const success = await postData('deleteAdmin', { username });
            if (success) await loadAllData();
            return success;
        }
        
        // Initialize app
        async function init() {
            const loaded = await loadAllData();
            
            if (loaded) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                renderMemberView();
            } else {
                document.getElementById('loadingOverlay').innerHTML = '<div class="loading-text" style="color: var(--danger);">Error loading data. Please refresh the page.</div>';
            }
        }
        
        // Show/hide functions
        function showAdminLogin() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }
        
        function goToMemberView() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            showMemberView();
        }
        
        function showMemberView() {
            document.getElementById('member-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            renderMemberView();
        }
        
        function showAdminView() {
            document.getElementById('member-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            switchAdminTab('overview');
        }
        
        // Switch admin tabs
        function switchAdminTab(tab) {
            currentAdminTab = tab;
            
            document.querySelectorAll('.admin-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event?.target?.classList.add('active');
            
            document.querySelectorAll('.admin-tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            
            const tabMap = {
                'overview': 'admin-overview',
                'classes': 'admin-classes',
                'settings': 'admin-settings'
            };
            
            document.getElementById(tabMap[tab]).classList.remove('hidden');
            
            if (tab === 'overview') {
                renderOverview();
            } else if (tab === 'classes') {
                renderClassManagement();
            } else if (tab === 'settings') {
                renderAdminAccounts();
            }
        }
        
        // Login
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (!username || !password) {
                messageDiv.innerHTML = '<div class="message error">Please enter both username and password</div>';
                return;
            }
            
            const admins = getAdminAccounts();
            const admin = admins.find(a => a.username === username && a.password === password);
            
            if (admin) {
                isAdminLoggedIn = true;
                currentAdminUsername = username;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('adminButton').classList.add('hidden');
                document.getElementById('logoutButton').classList.remove('hidden');
                showAdminView();
                
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                messageDiv.innerHTML = '';
            } else {
                messageDiv.innerHTML = '<div class="message error">Invalid username or password</div>';
            }
        }
        
        // Logout
        function logout() {
            isAdminLoggedIn = false;
            currentAdminUsername = null;
            document.getElementById('adminButton').classList.remove('hidden');
            document.getElementById('logoutButton').classList.add('hidden');
            showMemberView();
        }
        
        // Render admin accounts list
        function renderAdminAccounts() {
            const admins = getAdminAccounts();
            const container = document.getElementById('adminAccountsList');
            
            container.innerHTML = admins.map((admin, index) => `
                <div class="admin-account-item">
                    <div class="admin-account-info">
                        <div class="admin-account-icon">${admin.name ? admin.name.charAt(0).toUpperCase() : admin.username.charAt(0).toUpperCase()}</div>
                        <div class="admin-account-details">
                            <h4>${admin.name || admin.username}</h4>
                            <p>Username: ${admin.username}</p>
                        </div>
                    </div>
                    ${admins.length > 1 ? `<button class="btn btn-danger" onclick="deleteAdminAccount('${admin.username}')">Delete</button>` : '<span style="color: var(--text-light); font-size: 0.85rem;">Primary Admin</span>'}
                </div>
            `).join('');
        }
        
        // Add admin account
        async function addAdminAccount() {
            const username = document.getElementById('newAdminUsername').value.trim();
            const password = document.getElementById('newAdminPassword').value;
            const name = document.getElementById('newAdminName').value.trim();
            const messageDiv = document.getElementById('addAdminMessage');
            
            if (!username || !password) {
                messageDiv.innerHTML = '<div class="message error">Please enter both username and password</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            if (username.length < 3) {
                messageDiv.innerHTML = '<div class="message error">Username must be at least 3 characters</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<div class="message error">Password must be at least 6 characters</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            const admins = getAdminAccounts();
            
            if (admins.find(a => a.username === username)) {
                messageDiv.innerHTML = '<div class="message error">Username already exists</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            const saved = await addAdminAccountToSheet(username, password, name || username);
            
            if (saved) {
                messageDiv.innerHTML = '<div class="message success">✓ Admin account added successfully!</div>';
                document.getElementById('newAdminUsername').value = '';
                document.getElementById('newAdminPassword').value = '';
                document.getElementById('newAdminName').value = '';
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 3000);
                
                renderAdminAccounts();
            } else {
                messageDiv.innerHTML = '<div class="message error">Failed to add admin account</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
            }
        }
        
        // Delete admin account
        async function deleteAdminAccount(username) {
            if (!confirm(`Are you sure you want to delete the admin account "${username}"?`)) {
                return;
            }
            
            const admins = getAdminAccounts();
            
            if (admins.length === 1) {
                alert('Cannot delete the last admin account');
                return;
            }
            
            await deleteAdminAccountFromSheet(username);
            renderAdminAccounts();
        }
        
        // Render date selector
        function renderDateSelector() {
            const container = document.getElementById('dateSelector');
            const classes = getClasses();
            const dates = [...new Set(classes.map(c => c.date))].sort();
            
            if (dates.length === 0) {
                container.innerHTML = '<p style="color: var(--text-light);">No classes scheduled yet</p>';
                return;
            }
            
            container.innerHTML = dates.map(date => {
                const d = new Date(date + 'T00:00:00');
                const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = d.getDate();
                const month = d.toLocaleDateString('en-US', { month: 'short' });
                
                return `
                    <button class="date-btn ${date === selectedDate ? 'active' : ''}" onclick="selectDate('${date}')">
                        <span class="day">${dayName}</span>
                        <span class="date">${dayNum} ${month}</span>
                    </button>
                `;
            }).join('');
        }
        
        // Select date
        function selectDate(date) {
            selectedDate = date;
            renderMemberView();
        }
        
        // Render member view
        async function renderMemberView() {
            renderDateSelector();
            const classes = getClasses();
            const dayClasses = classes.filter(c => c.date === selectedDate).sort((a, b) => a.time.localeCompare(b.time));
            
            const container = document.getElementById('classesGrid');
            
            if (dayClasses.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-light); padding: 40px;">No classes scheduled for this day</p>';
                return;
            }
            
            container.innerHTML = dayClasses.map(classItem => {
                const bookings = getClassBookings(classItem.id);
                const spotsLeft = parseInt(classItem.capacity) - bookings.members.length;
                const isFull = spotsLeft <= 0;
                const isAlmostFull = spotsLeft <= 3 && spotsLeft > 0;
                
                return `
                    <div class="class-card">
                        <div class="class-time">${formatTime(classItem.time)}</div>
                        <div class="trainer-name">
                            <div class="trainer-icon">👤</div>
                            <span><strong>Trainer:</strong> ${classItem.trainer}</span>
                        </div>
                        <div class="class-info">
                            <div class="capacity ${isFull ? 'full' : isAlmostFull ? 'almost-full' : ''}">
                                <span class="capacity-number">${bookings.members.length}/${classItem.capacity}</span>
                                <span>Athletes</span>
                            </div>
                            <span class="status-badge ${isFull ? 'full' : 'available'}">
                                ${isFull ? 'FULL' : `${spotsLeft} Spots Left`}
                            </span>
                        </div>
                        
                        ${bookings.members.length > 0 || bookings.waitlist.length > 0 ? `
                            <div class="members-list">
                                ${bookings.members.map(member => `
                                    <div class="member-item">
                                        <div class="member-avatar">${member.charAt(0).toUpperCase()}</div>
                                        <div class="member-name">${member}</div>
                                        <button class="btn btn-danger" onclick="cancelBooking('${classItem.id}', '${escapeQuotes(member)}', false)">Cancel</button>
                                    </div>
                                `).join('')}
                                ${bookings.waitlist.length > 0 ? `
                                    <h4 style="margin-top: 15px; margin-bottom: 10px; color: var(--text-light);">Waitlist</h4>
                                    ${bookings.waitlist.map(member => `
                                        <div class="member-item">
                                            <div class="member-avatar">${member.charAt(0).toUpperCase()}</div>
                                            <div class="member-name">${member}</div>
                                            <span class="waitlist-badge">WAITLIST</span>
                                            <button class="btn btn-danger" onclick="cancelBooking('${classItem.id}', '${escapeQuotes(member)}', true)">Remove</button>
                                        </div>
                                    `).join('')}
                                ` : ''}
                            </div>
                        ` : '<p style="color: var(--text-light); text-align: center; padding: 20px;">No bookings yet - be the first!</p>'}
                        
                        <div class="booking-form">
                            <input type="text" id="name-${classItem.id}" placeholder="Enter your first name" required>
                            <button class="btn btn-primary" id="book-btn-${classItem.id}" onclick="bookClass('${classItem.id}')">
                                ${isFull ? 'Join Waitlist' : 'Book Spot'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Helper function to escape quotes
        function escapeQuotes(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }
        
        // Book class
        async function bookClass(classId) {
            const input = document.getElementById(`name-${classId}`);
            const btn = document.getElementById(`book-btn-${classId}`);
            const name = input.value.trim();
            
            if (!name) {
                alert('Please enter your first name to book a class');
                input.focus();
                return;
            }
            
            if (name.length < 2) {
                alert('Please enter a valid first name');
                input.focus();
                return;
            }
            
            const classes = getClasses();
            const classItem = classes.find(c => c.id === classId);
            
            if (!classItem) {
                alert('Class not found');
                return;
            }
            
            const bookings = getClassBookings(classId);
            
            if (bookings.members.includes(name)) {
                alert('You are already booked for this class');
                return;
            }
            
            if (bookings.waitlist.includes(name)) {
                alert('You are already on the waitlist for this class');
                return;
            }
            
            // Show loading state
            btn.disabled = true;
            btn.classList.add('loading');
            
            try {
                const isWaitlist = bookings.members.length >= parseInt(classItem.capacity);
                const saved = await addBooking(classId, name, isWaitlist);
                
                if (saved) {
                    if (isWaitlist) {
                        alert(`✓ ${name} added to waitlist for ${formatTime(classItem.time)} class.`);
                    } else {
                        alert(`✓ Successfully booked ${name} for ${formatTime(classItem.time)} class with ${classItem.trainer}!`);
                    }
                    input.value = '';
                    renderMemberView();
                } else {
                    alert('Failed to book. Please try again.');
                }
            } catch (error) {
                console.error('Booking error:', error);
                alert('An error occurred. Please try again.');
            } finally {
                // Remove loading state
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
        
        // Cancel booking
        async function cancelBooking(classId, name, isWaitlist) {
            if (!confirm(`Are you sure you want to cancel ${name}'s booking?`)) {
                return;
            }
            
            const removed = await removeBooking(classId, name);
            
            if (removed) {
                const classes = getClasses();
                const classItem = classes.find(c => c.id === classId);
                const bookings = getClassBookings(classId);
                
                if (!isWaitlist && bookings.waitlist.length > 0 && bookings.members.length < parseInt(classItem.capacity)) {
                    const nextMember = bookings.waitlist[0];
                    await removeBooking(classId, nextMember);
                    await addBooking(classId, nextMember, false);
                    alert(`${nextMember} has been moved from the waitlist to the class!`);
                }
                
                renderMemberView();
            } else {
                alert('Failed to cancel booking. Please try again.');
            }
        }
        
        // Render overview
        function renderOverview() {
            const classes = getClasses();
            let totalBookings = 0;
            let totalWaitlist = 0;
            
            classes.forEach(c => {
                const bookings = getClassBookings(c.id);
                totalBookings += bookings.members.length;
                totalWaitlist += bookings.waitlist.length;
            });
            
            const classesWithBookings = classes.filter(c => getClassBookings(c.id).members.length > 0).length;
            const avgAttendance = classesWithBookings > 0 ? (totalBookings / classesWithBookings).toFixed(1) : 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${classes.length}</div>
                    <div class="stat-label">Total Classes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalBookings}</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalWaitlist}</div>
                    <div class="stat-label">Waitlist Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgAttendance}</div>
                    <div class="stat-label">Avg Attendance</div>
                </div>
            `;
        }
        
        // Render class management
        function renderClassManagement() {
            const classes = getClasses();
            const sortedClasses = [...classes].sort((a, b) => {
                const dateCompare = a.date.localeCompare(b.date);
                return dateCompare !== 0 ? dateCompare : a.time.localeCompare(b.time);
            });
            
            document.getElementById('adminClassesList').innerHTML = sortedClasses.length > 0 ? sortedClasses.map(c => {
                const bookings = getClassBookings(c.id);
                return `
                    <div class="class-card" style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                            <div>
                                <div class="class-time" style="display: inline-block; margin-right: 20px;">${formatTime(c.time)}</div>
                                <span style="color: var(--text-light);">${formatDate(c.date)}</span>
                                <div style="margin-top: 5px; color: var(--text-light); font-size: 0.9rem;">
                                    👤 Trainer: <strong style="color: var(--text);">${c.trainer}</strong>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div class="capacity">
                                    <span class="capacity-number">${bookings.members.length}/${c.capacity}</span>
                                    <span>Booked</span>
                                    ${bookings.waitlist.length > 0 ? `<span style="color: var(--accent); margin-left: 10px;">(${bookings.waitlist.length} waitlist)</span>` : ''}
                                </div>
                                <button class="btn btn-danger" style="margin-top: 10px;" onclick="deleteClassConfirm('${c.id}')">Delete Class</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') : '<p style="color: var(--text-light); text-align: center; padding: 20px;">No classes scheduled yet</p>';
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('newClassDate').value = tomorrow.toISOString().split('T')[0];
        }
        
        // Add class with loading state
        async function addClass() {
            const date = document.getElementById('newClassDate').value;
            const time = document.getElementById('newClassTime').value;
            const trainer = document.getElementById('newClassTrainer').value.trim();
            const capacity = parseInt(document.getElementById('newClassCapacity').value);
            const messageDiv = document.getElementById('addClassMessage');
            const btn = document.getElementById('addClassBtn');
            
            if (!date || !time || !trainer || !capacity) {
                messageDiv.innerHTML = '<div class="message error">Please fill in all fields including trainer name</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            if (capacity < 1 || capacity > 30) {
                messageDiv.innerHTML = '<div class="message error">Capacity must be between 1 and 30</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            const formattedTime = formatTimeInput(time);
            
            const classes = getClasses();
            const newClass = {
                id: `class-${date}-${formattedTime}`,
                date: date,
                time: formattedTime,
                trainer: trainer,
                capacity: capacity.toString()
            };
            
            if (classes.find(c => c.id === newClass.id)) {
                messageDiv.innerHTML = '<div class="message error">A class already exists at this date and time</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
                return;
            }
            
            // Show loading state
            btn.disabled = true;
            btn.classList.add('loading');
            
            try {
                const saved = await saveClass(newClass);
                
                if (saved) {
                    messageDiv.innerHTML = '<div class="message success">✓ Class added successfully!</div>';
                    document.getElementById('newClassTime').value = '';
                    document.getElementById('newClassTrainer').value = '';
                    document.getElementById('newClassCapacity').value = '15';
                    
                    setTimeout(() => {
                        messageDiv.innerHTML = '';
                    }, 3000);
                    
                    renderClassManagement();
                } else {
                    messageDiv.innerHTML = '<div class="message error">Failed to add class. Please try again.</div>';
                    setTimeout(() => messageDiv.innerHTML = '', 3000);
                }
            } catch (error) {
                console.error('Add class error:', error);
                messageDiv.innerHTML = '<div class="message error">An error occurred. Please try again.</div>';
                setTimeout(() => messageDiv.innerHTML = '', 3000);
            } finally {
                // Remove loading state
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
        
        // Delete class confirmation
        async function deleteClassConfirm(classId) {
            if (!confirm('Are you sure you want to delete this class? All bookings will be lost.')) return;
            
            await deleteClass(classId);
            renderClassManagement();
        }
        
        // Format time
        function formatTime(time) {
            if (!time) return 'Invalid Time';
            const parts = time.split(':');
            if (parts.length < 2) return 'Invalid Time';
            
            const h = parseInt(parts[0]);
            const minutes = parts[1];
            const ampm = h >= 12 ? 'PM' : 'AM';
            const displayHour = h % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }
        
        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return 'Invalid Date';
            const date = new Date(dateStr + 'T00:00:00');
            if (isNaN(date.getTime())) return 'Invalid Date';
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }
        
        // Allow Enter key for login
        document.addEventListener('DOMContentLoaded', function() {
            const loginPassword = document.getElementById('loginPassword');
            if (loginPassword) {
                loginPassword.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        login();
                    }
                });
            }
        });
        
        // Start app
        init();
    </script>
</body>
</html>
